<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Content Studio</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0A0A0F;
    --surface: #14141F;
    --surface2: #1E1E2E;
    --surface3: #282840;
    --border: rgba(255,255,255,0.06);
    --text: #F0F0F5;
    --text-sec: #8888A0;
    --text-dim: #55556A;
    --orange: #FF6B35;
    --purple: #7C5CFC;
    --pink: #FF3366;
    --green: #00D4AA;
    --yellow: #F7C948;
  }

  body {
    font-family: 'Manrope', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 16px 16px 32px; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideIn { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
  @keyframes pulse { 0%,100% { opacity:.4; } 50% { opacity:1; } }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
  @keyframes floatDot {
    0%,100% { transform: translateY(0) scale(1); opacity:.2; }
    50% { transform: translateY(-15px) scale(1.4); opacity:.6; }
  }
  @keyframes glowPulse {
    0%,100% { box-shadow: 0 0 8px rgba(124,92,252,.3); }
    50% { box-shadow: 0 0 20px rgba(124,92,252,.6); }
  }

  .fade-up { animation: fadeUp .4s ease both; }
  .slide-in { animation: slideIn .4s ease both; }

  .header-back { display: flex; align-items: center; gap: 12px; }
  .btn-back {
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-back:active { transform: scale(.92); }
  .header-sub { font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
  .header-title { font-size: 20px; font-weight: 700; }

  .logo-label {
    font-size: 11px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px;
  }
  .logo-heading {
    font-size: 26px; font-weight: 800; line-height: 1.2;
    background: linear-gradient(135deg, var(--orange), var(--purple), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-desc { color: var(--text-sec); margin-top: 6px; font-size: 14px; line-height: 1.5; }

  .settings-row { display: flex; justify-content: flex-end; margin-bottom: 8px; }
  .settings-btn {
    width: 42px; height: 42px; border-radius: 14px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-sec); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; flex-shrink: 0;
  }
  .settings-btn:active { transform: scale(.9); }
  .settings-btn.needs-key { border-color: var(--purple); animation: glowPulse 2s infinite; }

  .mode-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 22px; cursor: pointer;
    position: relative; overflow: hidden; transition: all .3s;
    text-align: left; width: 100%; color: var(--text); font-family: inherit;
  }
  .mode-card:active { transform: scale(.97); }
  .mode-icon {
    width: 50px; height: 50px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .mode-card-top { display: flex; align-items: center; justify-content: space-between; }
  .mode-arrow {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--surface2); display: flex;
    align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 15px;
  }
  .mode-sub { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 3px; }
  .mode-name { font-size: 19px; font-weight: 700; }
  .mode-desc { font-size: 13px; color: var(--text-sec); margin-top: 5px; line-height: 1.4; }
  .mode-info { margin-top: 14px; }
  .dots-container { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .dot { position: absolute; border-radius: 50%; animation: floatDot 4s ease-in-out infinite; }

  .field-label { font-size: 12px; font-weight: 600; color: var(--text-sec); margin-bottom: 8px; letter-spacing: .4px; }
  .field-input {
    width: 100%; padding: 14px 16px; border-radius: 14px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 14px; font-family: inherit;
    outline: none; transition: border-color .2s;
  }
  .field-input:focus { border-color: rgba(255,255,255,0.15); }
  .field-input::placeholder { color: var(--text-dim); }

  .field-textarea {
    width: 100%; padding: 14px 16px; border-radius: 14px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 14px; font-family: inherit;
    outline: none; transition: border-color .2s;
    resize: vertical; min-height: 80px; line-height: 1.5;
  }
  .field-textarea:focus { border-color: rgba(255,255,255,0.15); }
  .field-textarea::placeholder { color: var(--text-dim); }

  .chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 10px 15px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-sec); font-size: 13px; font-weight: 400;
    cursor: pointer; transition: all .2s; font-family: inherit;
  }
  .chip.active { font-weight: 600; }

  .btn-generate {
    width: 100%; padding: 18px 24px; border-radius: 16px;
    border: none; color: #fff; font-weight: 700; font-size: 16px;
    cursor: pointer; font-family: inherit; letter-spacing: .3px; transition: all .3s;
  }
  .btn-generate.ready { cursor: pointer; }
  .btn-generate.not-ready { background: var(--surface2) !important; color: var(--text-dim); cursor: not-allowed; box-shadow: none !important; }
  .btn-generate:active:not(.not-ready) { transform: scale(.97); }
  .hint { text-align: center; font-size: 11px; color: var(--text-dim); margin-top: 10px; }

  .result-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 22px;
    max-height: calc(100vh - 200px); overflow-y: auto;
    font-size: 14px; line-height: 1.7;
  }
  .result-box h2 { font-size: 18px; font-weight: 800; margin: 18px 0 6px; color: var(--text); }
  .result-box h3 { font-size: 16px; font-weight: 700; margin: 14px 0 5px; color: var(--text); }
  .result-box h4 { font-size: 14px; font-weight: 700; margin: 12px 0 4px; color: var(--text); }
  .result-box p { margin: 3px 0; color: var(--text-sec); }
  .result-box strong { color: var(--text); font-weight: 600; }
  .result-box .spacer { height: 8px; }
  .result-box .bullet { padding-left: 16px; position: relative; }
  .result-box .bullet::before { content: "\2022"; position: absolute; left: 0; }

  .gen-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 10px; font-size: 12px; font-weight: 600;
  }
  .gen-dot { animation: pulse 1.2s infinite; }
  .cursor-blink { animation: blink .8s infinite; }

  .result-actions { display: flex; gap: 10px; margin-top: 14px; }
  .btn-action {
    flex: 1; padding: 14px 18px; border-radius: 14px;
    font-weight: 600; font-size: 14px; cursor: pointer;
    font-family: inherit; transition: all .2s;
  }
  .btn-action:active { transform: scale(.96); }
  .btn-copy { border: 1px solid var(--border); background: var(--surface); color: var(--text); }
  .btn-retry { border: none; color: #fff; }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 200; display: flex; align-items: flex-end; justify-content: center;
  }
  .settings-panel {
    width: 100%; max-width: 480px; background: var(--surface);
    border-radius: 24px 24px 0 0; padding: 24px 20px 40px;
    animation: fadeUp .3s ease; max-height: 90vh; overflow-y: auto;
  }
  .settings-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--surface3); margin: 0 auto 20px; }
  .settings-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .settings-subtitle { font-size: 13px; color: var(--text-sec); line-height: 1.5; margin-bottom: 18px; }
  .settings-label { font-size: 12px; font-weight: 600; color: var(--text-sec); margin-bottom: 6px; display: block; }
  .settings-input {
    width: 100%; padding: 12px 14px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: 14px; font-family: inherit;
    outline: none; transition: border-color .2s;
  }
  .settings-input:focus { border-color: rgba(255,255,255,.15); }
  .settings-input::placeholder { color: var(--text-dim); }

  .provider-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .provider-tab {
    flex: 1; min-width: 90px; padding: 11px 8px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text-sec); font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all .2s; text-align: center;
  }
  .provider-tab.active { border-color: var(--purple); color: var(--purple); background: rgba(124,92,252,.1); }

  .btn-save {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--purple), var(--green));
    color: #fff; font-weight: 700; font-size: 15px;
    cursor: pointer; font-family: inherit; margin-top: 18px;
  }
  .btn-save:active { transform: scale(.97); }

  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .status-ok { background: var(--green); }
  .status-no { background: #FF4444; }

  .footer-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 10px;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 11px; color: var(--text-dim);
  }

  .key-banner {
    padding: 16px; border-radius: 16px;
    background: linear-gradient(135deg, rgba(124,92,252,.12), rgba(0,212,170,.08));
    border: 1px solid rgba(124,92,252,.25);
    text-align: center; margin-bottom: 16px; cursor: pointer; transition: all .2s;
  }
  .key-banner:active { transform: scale(.98); }
  .key-banner-icon { font-size: 28px; margin-bottom: 8px; }
  .key-banner-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .key-banner-desc { font-size: 12px; color: var(--text-sec); line-height: 1.4; }

  .help-block {
    margin-top: 14px; padding: 14px; border-radius: 12px;
    background: var(--surface2); border: 1px solid var(--border);
  }
  .help-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
  .help-step { font-size: 12px; color: var(--text-sec); line-height: 1.6; margin-bottom: 3px; }

  .context-label-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .context-badge {
    font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px;
    background: rgba(124,92,252,.15); color: var(--purple); letter-spacing: .5px;
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px; }
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
var tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  try { tg.setHeaderColor('#0A0A0F'); } catch(e){}
  try { tg.setBackgroundColor('#0A0A0F'); } catch(e){}
}

// ===== STATE =====
var state = {
  screen: 'home',
  activeMode: null,
  formData: {},
  result: '',
  streamedText: '',
  isGenerating: false,
  showSettings: false,
  provider: localStorage.getItem('ai_provider') || 'custom',
  openaiKey: localStorage.getItem('openai_key') || '',
  claudeKey: localStorage.getItem('claude_key') || '',
  customKey: localStorage.getItem('custom_key') || '',
  customUrl: localStorage.getItem('custom_url') || '',
  customModel: localStorage.getItem('custom_model') || '',
  copied: false,
};

var firstRun = !state.openaiKey && !state.claudeKey && !state.customKey;

// ===== MODES =====
var MODES = [
  {
    id: 'posts', title: '\u041F\u043E\u0441\u0442\u044B', subtitle: '\u0418\u0418-\u043A\u043E\u043F\u0438\u0440\u0430\u0439\u0442\u0435\u0440', icon: '\u270D\uFE0F',
    color: '#FF6B35', gradient: 'linear-gradient(135deg, #FF6B35, #F7C948)',
    desc: '\u041F\u0440\u043E\u0433\u0440\u0435\u0432\u0430\u044E\u0449\u0438\u0435 \u043F\u043E\u0441\u0442\u044B, \u0441\u0442\u043E\u0440\u0438\u0441 \u0438 \u043A\u043E\u043D\u0442\u0435\u043D\u0442-\u043F\u043B\u0430\u043D\u044B \u0434\u043B\u044F \u0437\u0430\u043F\u0443\u0441\u043A\u0430',
    fields: [
      { key:'product', label:'\u0427\u0442\u043E \u0437\u0430\u043F\u0443\u0441\u043A\u0430\u0435\u043C?', ph:'\u041A\u0443\u0440\u0441 \u043F\u043E \u0442\u0430\u0440\u0433\u0435\u0442\u0443, \u043C\u0430\u0440\u0430\u0444\u043E\u043D...', type:'text' },
      { key:'audience', label:'\u0426\u0435\u043B\u0435\u0432\u0430\u044F \u0430\u0443\u0434\u0438\u0442\u043E\u0440\u0438\u044F', ph:'\u0416\u0435\u043D\u0449\u0438\u043D\u044B 25-35, \u043F\u0440\u0435\u0434\u043F\u0440\u0438\u043D\u0438\u043C\u0430\u0442\u0435\u043B\u0438...', type:'text' },
      { key:'tone', label:'\u0422\u043E\u043D \u043A\u043E\u043C\u043C\u0443\u043D\u0438\u043A\u0430\u0446\u0438\u0438', ph:'\u0414\u0440\u0443\u0436\u0435\u0441\u043A\u0438\u0439, \u044D\u043A\u0441\u043F\u0435\u0440\u0442\u043D\u044B\u0439...', type:'text' },
      { key:'stage', label:'\u042D\u0442\u0430\u043F \u043F\u0440\u043E\u0433\u0440\u0435\u0432\u0430', type:'select', opts:['\u0417\u043D\u0430\u043A\u043E\u043C\u0441\u0442\u0432\u043E \u0441 \u044D\u043A\u0441\u043F\u0435\u0440\u0442\u043E\u043C','\u041E\u0441\u043E\u0437\u043D\u0430\u043D\u0438\u0435 \u043F\u0440\u043E\u0431\u043B\u0435\u043C\u044B','\u0414\u0435\u043C\u043E\u043D\u0441\u0442\u0440\u0430\u0446\u0438\u044F \u044D\u043A\u0441\u043F\u0435\u0440\u0442\u043D\u043E\u0441\u0442\u0438','\u041A\u0435\u0439\u0441\u044B \u0438 \u0440\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442\u044B','\u041E\u0442\u043A\u0440\u044B\u0442\u0438\u0435 \u043F\u0440\u043E\u0434\u0430\u0436','\u0414\u043E\u0436\u0438\u043C \u0438 \u0437\u0430\u043A\u0440\u044B\u0442\u0438\u0435'] },
      { key:'format', label:'\u0424\u043E\u0440\u043C\u0430\u0442', type:'select', opts:['\u041F\u043E\u0441\u0442 \u0432 \u043A\u0430\u043D\u0430\u043B','\u0421\u0435\u0440\u0438\u044F \u0441\u0442\u043E\u0440\u0438\u0441','\u0420\u0438\u043B\u0441 / \u0441\u0446\u0435\u043D\u0430\u0440\u0438\u0439','Email-\u0440\u0430\u0441\u0441\u044B\u043B\u043A\u0430','\u041A\u043E\u043D\u0442\u0435\u043D\u0442-\u043F\u043B\u0430\u043D \u043D\u0430 \u043D\u0435\u0434\u0435\u043B\u044E'] },
    ],
    system: '\u0422\u044B \u2014 \u044D\u043A\u0441\u043F\u0435\u0440\u0442-\u043A\u043E\u043F\u0438\u0440\u0430\u0439\u0442\u0435\u0440 \u043F\u043E \u043F\u0440\u043E\u0433\u0440\u0435\u0432\u0430\u043C \u0438 \u0437\u0430\u043F\u0443\u0441\u043A\u0430\u043C \u0438\u043D\u0444\u043E\u043F\u0440\u043E\u0434\u0443\u043A\u0442\u043E\u0432. \u041F\u0438\u0448\u0438 \u0436\u0438\u0432\u043E, \u0441 \u044D\u043C\u043E\u0446\u0438\u044F\u043C\u0438, \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u0443\u0439 \u0441\u0442\u043E\u0440\u0438\u0442\u0435\u043B\u043B\u0438\u043D\u0433 \u0438 \u0442\u0440\u0438\u0433\u0433\u0435\u0440\u044B. \u041D\u0438\u043A\u0430\u043A\u043E\u0433\u043E \u043A\u0430\u043D\u0446\u0435\u043B\u044F\u0440\u0438\u0442\u0430. \u0422\u0435\u043A\u0441\u0442 \u0434\u043E\u043B\u0436\u0435\u043D \u0446\u0435\u043F\u043B\u044F\u0442\u044C \u0441 \u043F\u0435\u0440\u0432\u043E\u0439 \u0441\u0442\u0440\u043E\u043A\u0438. \u042D\u043C\u043E\u0434\u0437\u0438 \u0443\u043C\u0435\u0441\u0442\u043D\u043E, \u043D\u043E \u0431\u0435\u0437 \u043F\u0435\u0440\u0435\u0431\u043E\u0440\u0430. \u041F\u0438\u0448\u0438 \u043D\u0430 \u0440\u0443\u0441\u0441\u043A\u043E\u043C \u044F\u0437\u044B\u043A\u0435. \u041A\u043E\u0440\u043E\u0442\u043A\u0438\u0435 \u0430\u0431\u0437\u0430\u0446\u044B, \u0432\u043E\u0437\u0434\u0443\u0445 \u043C\u0435\u0436\u0434\u0443 \u0431\u043B\u043E\u043A\u0430\u043C\u0438.'
  },
  {
    id: 'strategy', title: '\u0421\u0442\u0440\u0430\u0442\u0435\u0433\u0438\u044F', subtitle: '\u0418\u0418-\u0441\u0442\u0440\u0430\u0442\u0435\u0433', icon: '\uD83C\uDFAF',
    color: '#7C5CFC', gradient: 'linear-gradient(135deg, #7C5CFC, #00D4AA)',
    desc: '\u041F\u043E\u0448\u0430\u0433\u043E\u0432\u0430\u044F \u0441\u0442\u0440\u0430\u0442\u0435\u0433\u0438\u044F \u0437\u0430\u043F\u0443\u0441\u043A\u0430 \u0441 \u0442\u0430\u0439\u043C\u043B\u0430\u0439\u043D\u043E\u043C \u0438 \u0432\u043E\u0440\u043E\u043D\u043A\u0430\u043C\u0438',
    fields: [
      { key:'product', label:'\u041F\u0440\u043E\u0434\u0443\u043A\u0442', ph:'\u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435 \u0438 \u043E\u043F\u0438\u0441\u0430\u043D\u0438\u0435...', type:'text' },

// ===== API CALLS =====

function callOpenAI(systemPrompt, userPrompt) {
  return fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + state.openaiKey },
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userPrompt }],
      max_tokens: 4000, temperature: 0.8,
    })
  }).then(function(res) {
    if (!res.ok) return res.text().then(function(t) {
      try { var e = JSON.parse(t); throw new Error(e.error && e.error.message || 'OpenAI: ' + res.status); }
      catch(ex) { if (ex.message.indexOf('OpenAI') >= 0) throw ex; throw new Error('OpenAI: ' + res.status); }
    });
    return res.json();
  }).then(function(data) { return data.choices[0].message.content; });
}

function callClaude(systemPrompt, userPrompt) {
  return fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json', 'x-api-key': state.claudeKey,
      'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514', max_tokens: 4000, system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }],
    })
  }).then(function(res) {
    if (!res.ok) return res.text().then(function(t) {
      try { var e = JSON.parse(t); throw new Error(e.error && e.error.message || 'Claude: ' + res.status); }
      catch(ex) { if (ex.message.indexOf('Claude') >= 0) throw ex; throw new Error('Claude: ' + res.status); }
    });
    return res.json();
  }).then(function(data) { return data.content.map(function(c) { return c.text || ''; }).join('\n'); });
}

function callCustom(systemPrompt, userPrompt) {
  var url = state.customUrl.replace(/\/+$/, '') + '/v1/chat/completions';
  var model = state.customModel || 'gpt-4o-mini';
  return fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + state.customKey },
    body: JSON.stringify({
      model: model,
      messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userPrompt }],
      max_tokens: 4000, temperature: 0.8,
    })
  }).then(function(res) {
    if (!res.ok) return res.text().then(function(t) {
      try { var e = JSON.parse(t); throw new Error(e.error && e.error.message || 'API: ' + res.status); }
      catch(ex) { if (ex.message.indexOf('API') >= 0) throw ex; throw new Error('API \u043E\u0448\u0438\u0431\u043A\u0430: ' + res.status + '. \u041F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 URL, \u043A\u043B\u044E\u0447 \u0438 \u043C\u043E\u0434\u0435\u043B\u044C.'); }
    });
    return res.json();
  }).then(function(data) {
    if (data.choices && data.choices[0]) return data.choices[0].message.content;
    if (data.content) return data.content.map(function(c) { return c.text || ''; }).join('\n');
    throw new Error('\u041D\u0435\u0438\u0437\u0432\u0435\u0441\u0442\u043D\u044B\u0439 \u0444\u043E\u0440\u043C\u0430\u0442 \u043E\u0442\u0432\u0435\u0442\u0430 API');
  });
}

function getFilledCount() {
  var count = 0;
  var keys = Object.keys(state.formData);
  for (var i = 0; i < keys.length; i++) {
    var v = state.formData[keys[i]];
    if (v && typeof v === 'string' && v.trim().length > 0) count++;
  }
  return count;
}

function hasApiKey() {
  if (state.provider === 'openai') return !!state.openaiKey;
  if (state.provider === 'claude') return !!state.claudeKey;
  if (state.provider === 'custom') return !!state.customKey && !!state.customUrl;
  return false;
}

function generate() {
  var mode = MODES.find(function(m) { return m.id === state.activeMode; });
  if (!mode) return;
  if (!hasApiKey()) { state.showSettings = true; render(); return; }

  state.isGenerating = true;
  state.result = '';
  state.streamedText = '';
  state.screen = 'result';
  render();

  var parts = mode.fields.map(function(f) {
    var v = state.formData[f.key];
    return v ? f.label + ': ' + v : null;
  }).filter(Boolean);

  // Add custom context
  if (state.formData._context && state.formData._context.trim()) {
    parts.push('\n\u0414\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u044B\u0439 \u043A\u043E\u043D\u0442\u0435\u043A\u0441\u0442:\n' + state.formData._context.trim());
  }

  var userPrompt = parts.join('\n');
  var call;

  if (state.provider === 'openai') call = callOpenAI(mode.system, userPrompt);
  else if (state.provider === 'claude') call = callClaude(mode.system, userPrompt);
  else call = callCustom(mode.system, userPrompt);

  call.then(function(text) {
    var i = 0;
    var iv = setInterval(function() {
      i += Math.floor(Math.random() * 4) + 2;
      if (i >= text.length) {
        state.streamedText = text; state.result = text;
        state.isGenerating = false; clearInterval(iv);
      } else { state.streamedText = text.slice(0, i); }
      render();
    }, 10);
  }).catch(function(err) {
    state.streamedText = '\u274C ' + err.message + '\n\n\u041D\u0430\u0436\u043C\u0438\u0442\u0435 \u2190 \u0438 \u0437\u0430\u0442\u0435\u043C \u2699\uFE0F \u0447\u0442\u043E\u0431\u044B \u043F\u0440\u043E\u0432\u0435\u0440\u0438\u0442\u044C \u043D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438.';
    state.result = 'error'; state.isGenerating = false; render();
  });
}

// ===== DOM =====
function h(tag, attrs) {
  var el = document.createElement(tag);
  var children = Array.prototype.slice.call(arguments, 2);
  if (attrs) {
    Object.keys(attrs).forEach(function(k) {
      var v = attrs[k];
      if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
      else if (k.indexOf('on') === 0) el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'className') el.className = v;
      else el.setAttribute(k, v);
    });
  }
  children.forEach(function(c) {
    if (Array.isArray(c)) c.forEach(function(cc) { if (cc != null && cc !== false) el.appendChild(typeof cc === 'string' ? document.createTextNode(cc) : cc); });
    else if (c != null && c !== false) el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
}

function renderDots(color) {
  var wrap = h('div', { className: 'dots-container' });
  for (var i = 0; i < 8; i++) {
    var s = 3 + Math.random() * 6;
    wrap.appendChild(h('div', { className: 'dot', style: {
      width: s+'px', height: s+'px', background: color,
      left: (Math.random()*100)+'%', top: (Math.random()*100)+'%',
      animationDelay: (Math.random()*3)+'s', animationDuration: (3+Math.random()*3)+'s',
    }}));
  }
  return wrap;
}

function parseMarkdown(text) {
  var frag = document.createDocumentFragment();
  text.split('\n').forEach(function(line) {
    if (line.indexOf('### ') === 0) frag.appendChild(h('h4', {}, line.slice(4)));
    else if (line.indexOf('## ') === 0) frag.appendChild(h('h3', {}, line.slice(3)));
    else if (line.indexOf('# ') === 0) frag.appendChild(h('h2', {}, line.slice(2)));
    else if (line.indexOf('- ') === 0 || line.indexOf('\u2022 ') === 0) frag.appendChild(h('p', { className: 'bullet' }, line.slice(2)));
    else if (line.trim() === '') frag.appendChild(h('div', { className: 'spacer' }));
    else {
      var p = h('p', {});
      line.split(/(\*\*[^*]+\*\*)/g).forEach(function(part) {
        if (part.indexOf('**') === 0 && part.lastIndexOf('**') === part.length - 2)
          p.appendChild(h('strong', {}, part.slice(2, -2)));
        else p.appendChild(document.createTextNode(part));
      });
      frag.appendChild(p);
    }
  });
  return frag;
}

// ===== UPDATE BUTTON STATE without full re-render =====
function updateGenerateBtn() {
  var btn = document.getElementById('gen-btn');
  if (!btn) return;
  var mode = MODES.find(function(m) { return m.id === state.activeMode; });
  if (!mode) return;
  var filled = getFilledCount();
  if (filled >= 2) {
    btn.className = 'btn-generate ready';
    btn.style.background = mode.gradient;
    btn.style.boxShadow = '0 8px 32px ' + mode.color + '30';
    btn.disabled = false;
  } else {
    btn.className = 'btn-generate not-ready';
    btn.style.background = '';
    btn.style.boxShadow = '';
    btn.disabled = true;
  }
  var hint = document.getElementById('gen-hint');
  if (hint) hint.textContent = filled >= 2 ? '\u0413\u043E\u0442\u043E\u0432\u043E \u043A \u0433\u0435\u043D\u0435\u0440\u0430\u0446\u0438\u0438!' : '\u0417\u0430\u043F\u043E\u043B\u043D\u0438\u0442\u0435 \u043C\u0438\u043D\u0438\u043C\u0443\u043C 2 \u043F\u043E\u043B\u044F';
}

// ===== RENDER =====
function render() {
  var app = document.getElementById('app');
  app.innerHTML = '';

  var mode = MODES.find(function(m) { return m.id === state.activeMode; });
  var _hasKey = hasApiKey();

  // ===== SETTINGS OVERLAY =====
  if (state.showSettings) {
    var overlay = h('div', { className: 'overlay', onClick: function(e) {
      if (e.target === e.currentTarget) { state.showSettings = false; render(); }
    }});

    // Key input based on provider
    var keyFields = [];

    if (state.provider === 'openai') {
      var ki = h('input', { className: 'settings-input', type: 'password', placeholder: 'sk-...', value: state.openaiKey });
      ki.addEventListener('input', function(e) { state.openaiKey = e.target.value; });
      keyFields.push(
        h('div', { style: { marginBottom: '14px' } },
          h('label', { className: 'settings-label' }, 'API-\u043A\u043B\u044E\u0447 OpenAI'), ki
        )
      );
    } else if (state.provider === 'claude') {
      var ki2 = h('input', { className: 'settings-input', type: 'password', placeholder: 'sk-ant-...', value: state.claudeKey });
      ki2.addEventListener('input', function(e) { state.claudeKey = e.target.value; });
      keyFields.push(
        h('div', { style: { marginBottom: '14px' } },
          h('label', { className: 'settings-label' }, 'API-\u043A\u043B\u044E\u0447 Claude'), ki2
        )
      );
    } else {
      // Custom provider
      var cu = h('input', { className: 'settings-input', type: 'text', placeholder: 'https://api.kie.ai \u0438\u043B\u0438 \u0434\u0440\u0443\u0433\u043E\u0439 URL', value: state.customUrl });
      cu.addEventListener('input', function(e) { state.customUrl = e.target.value; });

      var ck = h('input', { className: 'settings-input', type: 'password', placeholder: '\u0412\u0430\u0448 API-\u043A\u043B\u044E\u0447', value: state.customKey });
      ck.addEventListener('input', function(e) { state.customKey = e.target.value; });

      var cm = h('input', { className: 'settings-input', type: 'text', placeholder: 'gpt-4o-mini, claude-3-haiku \u0438\u043B\u0438 \u0434\u0440\u0443\u0433\u0430\u044F', value: state.customModel });
      cm.addEventListener('input', function(e) { state.customModel = e.target.value; });

      keyFields.push(
        h('div', { style: { marginBottom: '14px' } },
          h('label', { className: 'settings-label' }, 'URL \u0441\u0435\u0440\u0432\u0435\u0440\u0430 API'), cu,
          h('div', { style: { fontSize: '11px', color: 'var(--text-dim)', marginTop: '4px' } }, '\u0411\u0435\u0437 /v1/chat/completions \u043D\u0430 \u043A\u043E\u043D\u0446\u0435')
        ),
        h('div', { style: { marginBottom: '14px' } },
          h('label', { className: 'settings-label' }, 'API-\u043A\u043B\u044E\u0447'), ck
        ),
        h('div', { style: { marginBottom: '14px' } },
          h('label', { className: 'settings-label' }, '\u041C\u043E\u0434\u0435\u043B\u044C (\u043D\u0435\u043E\u0431\u044F\u0437\u0430\u0442\u0435\u043B\u044C\u043D\u043E)'), cm
        )
      );
    }

    var panel = h('div', { className: 'settings-panel' },
      h('div', { className: 'settings-handle' }),
      h('div', { className: 'settings-title' }, '\u2699\uFE0F \u041D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438 API'),
      h('div', { className: 'settings-subtitle' }, '\u0412\u044B\u0431\u0435\u0440\u0438\u0442\u0435 \u043F\u0440\u043E\u0432\u0430\u0439\u0434\u0435\u0440\u0430 \u0418\u0418 \u0438 \u0432\u0441\u0442\u0430\u0432\u044C\u0442\u0435 \u043A\u043B\u044E\u0447. \u041A\u043B\u044E\u0447 \u0445\u0440\u0430\u043D\u0438\u0442\u0441\u044F \u0442\u043E\u043B\u044C\u043A\u043E \u043D\u0430 \u0432\u0430\u0448\u0435\u043C \u0443\u0441\u0442\u0440\u043E\u0439\u0441\u0442\u0432\u0435.'),

      // Provider tabs - 3 options
      h('div', { className: 'provider-tabs' },
        h('button', {
          className: 'provider-tab' + (state.provider === 'custom' ? ' active' : ''),
          onClick: function() { state.provider = 'custom'; localStorage.setItem('ai_provider', 'custom'); render(); }
        }, '\uD83D\uDD17 \u0421\u0432\u043E\u0439 API'),
        h('button', {
          className: 'provider-tab' + (state.provider === 'openai' ? ' active' : ''),
          onClick: function() { state.provider = 'openai'; localStorage.setItem('ai_provider', 'openai'); render(); }
        }, '\uD83D\uDFE2 OpenAI'),
        h('button', {
          className: 'provider-tab' + (state.provider === 'claude' ? ' active' : ''),
          onClick: function() { state.provider = 'claude'; localStorage.setItem('ai_provider', 'claude'); render(); }
        }, '\uD83D\uDFE3 Claude'),
      ),

      // Status
      h('div', { style: { marginBottom: '16px', fontSize: '13px' } },
        h('span', { className: 'status-dot ' + (_hasKey ? 'status-ok' : 'status-no') }),
        _hasKey ? '\u041A\u043B\u044E\u0447 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u2713' : '\u041A\u043B\u044E\u0447 \u043D\u0435 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D'
      ),

      keyFields,

      // Help
      h('div', { className: 'help-block' },
        h('div', { className: 'help-title' }, '\uD83D\uDCD6 \u041F\u043E\u0434\u0441\u043A\u0430\u0437\u043A\u0430'),
        state.provider === 'custom' ? [
          h('div', { className: 'help-step' }, '\u0414\u043B\u044F kie.ai: URL = https://api.kie.ai'),
          h('div', { className: 'help-step' }, '\u0414\u043B\u044F proxyapi.ru: URL = https://api.proxyapi.ru'),
          h('div', { className: 'help-step' }, '\u041F\u043E\u0434\u0445\u043E\u0434\u0438\u0442 \u043B\u044E\u0431\u043E\u0439 OpenAI-\u0441\u043E\u0432\u043C\u0435\u0441\u0442\u0438\u043C\u044B\u0439 API'),
        ] : state.provider === 'openai' ? [
          h('div', { className: 'help-step' }, '1. platform.openai.com \u2192 API Keys'),
          h('div', { className: 'help-step' }, '2. Create new secret key'),
          h('div', { className: 'help-step' }, '3. \u041F\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435 \u0431\u0430\u043B\u0430\u043D\u0441 \u043E\u0442 $5'),
        ] : [
          h('div', { className: 'help-step' }, '1. console.anthropic.com \u2192 API Keys'),
          h('div', { className: 'help-step' }, '2. Create Key'),
          h('div', { className: 'help-step' }, '3. \u041F\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435 \u0431\u0430\u043B\u0430\u043D\u0441 \u043E\u0442 $5'),
        ]
      ),

      h('button', { className: 'btn-save', onClick: function() {
        localStorage.setItem('openai_key', state.openaiKey);
        localStorage.setItem('claude_key', state.claudeKey);
        localStorage.setItem('custom_key', state.customKey);
        localStorage.setItem('custom_url', state.customUrl);
        localStorage.setItem('custom_model', state.customModel);
        state.showSettings = false; firstRun = false; render();
      }}, '\uD83D\uDCBE \u0421\u043E\u0445\u0440\u0430\u043D\u0438\u0442\u044C')
    );

    overlay.appendChild(panel);
    app.appendChild(overlay);
  }

  // SETTINGS BUTTON
  var settingsRow = h('div', { className: 'settings-row' });
  settingsRow.appendChild(h('button', {
    className: 'settings-btn' + (!_hasKey ? ' needs-key' : ''),
    onClick: function() { state.showSettings = true; render(); }
  }, '\u2699\uFE0F'));
  app.appendChild(settingsRow);

  // HEADER
  var header = h('div', { style: { marginBottom: '4px' } });
  if (state.screen !== 'home' && mode) {
    header.appendChild(h('div', { className: 'header-back fade-up' },
      h('button', { className: 'btn-back', onClick: function() {
        if (state.screen === 'result') { state.screen = 'form'; state.result = ''; state.streamedText = ''; }
        else { state.screen = 'home'; state.activeMode = null; state.formData = {}; }
        render();
      }}, '\u2190'),
      h('div', {},
        h('div', { className: 'header-sub', style: { color: mode.color } }, mode.subtitle),
        h('div', { className: 'header-title' }, mode.icon + ' ' + mode.title)
      )
    ));
  } else {
    header.appendChild(h('div', { className: 'fade-up' },
      h('div', { className: 'logo-label' }, 'AI Content Studio'),
      h('div', { className: 'logo-heading' }, '\u0423\u043C\u043D\u044B\u0439 \u043F\u043E\u043C\u043E\u0449\u043D\u0438\u043A'),
      h('div', { className: 'logo-heading' }, '\u044D\u043A\u0441\u043F\u0435\u0440\u0442\u0430'),
      h('p', { className: 'logo-desc' }, '\u0412\u044B\u0431\u0435\u0440\u0438 \u0440\u0435\u0436\u0438\u043C \u0438 \u043F\u043E\u043B\u0443\u0447\u0438 \u0433\u043E\u0442\u043E\u0432\u044B\u0439 \u0440\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442 \u0437\u0430 \u043C\u0438\u043D\u0443\u0442\u0443')
    ));
  }
  app.appendChild(header);

  // CONTENT
  var content = h('div', { style: { marginTop: '16px' } });

  if (state.screen === 'home') {
    if (!_hasKey) {
      content.appendChild(h('div', {
        className: 'key-banner fade-up',
        onClick: function() { state.showSettings = true; render(); }
      },
        h('div', { className: 'key-banner-icon' }, '\uD83D\uDD11'),
        h('div', { className: 'key-banner-title' }, '\u0421\u043D\u0430\u0447\u0430\u043B\u0430 \u0434\u043E\u0431\u0430\u0432\u044C\u0442\u0435 API-\u043A\u043B\u044E\u0447'),
        h('div', { className: 'key-banner-desc' }, '\u041D\u0430\u0436\u043C\u0438\u0442\u0435 \u0441\u044E\u0434\u0430 \u0447\u0442\u043E\u0431\u044B \u043D\u0430\u0441\u0442\u0440\u043E\u0438\u0442\u044C \u043F\u043E\u0434\u043A\u043B\u044E\u0447\u0435\u043D\u0438\u0435 \u043A \u0418\u0418')
      ));
    }

    MODES.forEach(function(m, idx) {
      content.appendChild(h('button', {
        className: 'mode-card fade-up',
        style: { animationDelay: (idx * .08) + 's', display: 'block', marginBottom: '14px' },
        onClick: function() {
          if (!_hasKey) { state.showSettings = true; render(); return; }
          state.activeMode = m.id; state.screen = 'form'; state.formData = {}; render();
        }
      },
        renderDots(m.color),
        h('div', { style: { position: 'relative', zIndex: '2' } },
          h('div', { className: 'mode-card-top' },
            h('div', { className: 'mode-icon', style: { background: m.gradient, boxShadow: '0 4px 20px ' + m.color + '30' } }, m.icon),
            h('div', { className: 'mode-arrow' }, '\u2192')
          ),
          h('div', { className: 'mode-info' },
            h('div', { className: 'mode-sub', style: { color: m.color } }, m.subtitle),
            h('div', { className: 'mode-name' }, m.title),
            h('div', { className: 'mode-desc' }, m.desc)
          )
        )
      ));
    });

    var provName = state.provider === 'openai' ? 'OpenAI' : state.provider === 'claude' ? 'Claude' : '\u0421\u0432\u043E\u0439 API';
    content.appendChild(h('div', { style: { textAlign: 'center', marginTop: '16px' }, className: 'fade-up' },
      h('span', { className: 'footer-badge' }, '\u26A1 ' + provName)
    ));

  } else if (state.screen === 'form' && mode) {
    // Regular fields
    mode.fields.forEach(function(f, idx) {
      var fw = h('div', { className: 'slide-in', style: { marginBottom: '16px', animationDelay: (idx * .04) + 's' } });
      fw.appendChild(h('div', { className: 'field-label' }, f.label));

      if (f.type === 'select') {
        var chips = h('div', { className: 'chip-wrap' });
        f.opts.forEach(function(opt) {
          var active = state.formData[f.key] === opt;
          chips.appendChild(h('button', {
            className: 'chip' + (active ? ' active' : ''),
            style: active ? { borderColor: mode.color, color: mode.color, background: mode.color + '15' } : {},
            onClick: function() { state.formData[f.key] = opt; render(); }
          }, opt));
        });
        fw.appendChild(chips);
      } else {
        var inp = h('input', { className: 'field-input', type: 'text', placeholder: f.ph || '', value: state.formData[f.key] || '' });
        inp.addEventListener('input', function(e) {
          state.formData[f.key] = e.target.value;
          updateGenerateBtn();
        });
        inp.addEventListener('focus', function() { inp.style.borderColor = mode.color + '50'; });
        inp.addEventListener('blur', function() { inp.style.borderColor = 'rgba(255,255,255,0.06)'; });
        fw.appendChild(inp);
      }
      content.appendChild(fw);
    });

    // FREE TEXT CONTEXT FIELD
    var ctxWrap = h('div', { className: 'slide-in', style: { marginBottom: '16px', animationDelay: '0.3s' } });
    var ctxLabelRow = h('div', { className: 'context-label-row' },
      h('div', { className: 'field-label', style: { marginBottom: '0' } }, '\u0414\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u044B\u0439 \u043A\u043E\u043D\u0442\u0435\u043A\u0441\u0442'),
      h('span', { className: 'context-badge' }, '\u041D\u0415\u041E\u0411\u042F\u0417\u0410\u0422\u0415\u041B\u042C\u041D\u041E')
    );
    ctxWrap.appendChild(ctxLabelRow);
    var ctxArea = h('textarea', {
      className: 'field-textarea',
      placeholder: '\u041B\u044E\u0431\u0430\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u0430\u044F \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u044F: \u043E\u043F\u0438\u0441\u0430\u043D\u0438\u0435 \u043F\u0440\u043E\u0434\u0443\u043A\u0442\u0430, \u043E\u0441\u043E\u0431\u0435\u043D\u043D\u043E\u0441\u0442\u0438 \u0430\u0443\u0434\u0438\u0442\u043E\u0440\u0438\u0438, \u043F\u0440\u0438\u043C\u0435\u0440\u044B, \u043F\u043E\u0436\u0435\u043B\u0430\u043D\u0438\u044F...',
      value: state.formData._context || '',
    });
    ctxArea.addEventListener('input', function(e) {
      state.formData._context = e.target.value;
      updateGenerateBtn();
    });
    ctxArea.addEventListener('focus', function() { ctxArea.style.borderColor = mode.color + '50'; });
    ctxArea.addEventListener('blur', function() { ctxArea.style.borderColor = 'rgba(255,255,255,0.06)'; });
    ctxWrap.appendChild(ctxArea);
    content.appendChild(ctxWrap);

    // GENERATE BUTTON
    var filled = getFilledCount();
    var isReady = filled >= 2;
    var genBtn = h('button', {
      id: 'gen-btn',
      className: 'btn-generate ' + (isReady ? 'ready' : 'not-ready'),
      style: {
        background: isReady ? mode.gradient : '',
        boxShadow: isReady ? '0 8px 32px ' + mode.color + '30' : '',
        marginTop: '24px',
      },
      onClick: generate,
    }, '\u26A1 \u0421\u0433\u0435\u043D\u0435\u0440\u0438\u0440\u043E\u0432\u0430\u0442\u044C');
    if (!isReady) genBtn.disabled = true;
    content.appendChild(genBtn);
    content.appendChild(h('p', { id: 'gen-hint', className: 'hint' }, isReady ? '\u0413\u043E\u0442\u043E\u0432\u043E \u043A \u0433\u0435\u043D\u0435\u0440\u0430\u0446\u0438\u0438!' : '\u0417\u0430\u043F\u043E\u043B\u043D\u0438\u0442\u0435 \u043C\u0438\u043D\u0438\u043C\u0443\u043C 2 \u043F\u043E\u043B\u044F'));

  } else if (state.screen === 'result' && mode) {
    var box = h('div', { className: 'result-box slide-in' });
    if (state.isGenerating) {
      box.appendChild(h('div', {
        className: 'gen-badge',
        style: { background: mode.color + '15', border: '1px solid ' + mode.color + '30', color: mode.color, marginBottom: '12px' }
      }, h('span', { className: 'gen-dot' }, '\u25CF'), ' \u0413\u0435\u043D\u0435\u0440\u0438\u0440\u0443\u044E...'));
    }
    box.appendChild(parseMarkdown(state.streamedText));
    if (state.isGenerating) box.appendChild(h('span', { className: 'cursor-blink', style: { color: mode.color } }, '\u2588'));
    content.appendChild(box);

    if (!state.isGenerating && state.result && state.result !== 'error') {
      var actions = h('div', { className: 'result-actions fade-up' });
      actions.appendChild(h('button', {
        className: 'btn-action btn-copy',
        onClick: function() {
          navigator.clipboard.writeText(state.result).then(function() {
            state.copied = true; render();
            setTimeout(function() { state.copied = false; render(); }, 1500);
          });
        }
      }, state.copied ? '\u2705 \u0421\u043A\u043E\u043F\u0438\u0440\u043E\u0432\u0430\u043D\u043E!' : '\uD83D\uDCCB \u0421\u043A\u043E\u043F\u0438\u0440\u043E\u0432\u0430\u0442\u044C'));
      actions.appendChild(h('button', {
        className: 'btn-action btn-retry',
        style: { background: mode.gradient },
        onClick: function() { state.screen = 'form'; render(); }
      }, '\uD83D\uDD04 \u0418\u0437\u043C\u0435\u043D\u0438\u0442\u044C'));
      content.appendChild(actions);
    }
  }

  app.appendChild(content);

  if (firstRun) {
    firstRun = false;
    setTimeout(function() { state.showSettings = true; render(); }, 600);
  }
}

render();
</script>
</body>
</html>
